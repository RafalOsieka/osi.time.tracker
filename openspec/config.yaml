schema: spec-driven

# Project context
context: |
  # Tech Stack
  - Backend: .NET 10 (Minimal API), Aspire (Orchestration), PostgreSQL.
  - Frontend: Vue.js (SPA + PWA), Pinia, Vitest, Vite, pnpm.
  - Architecture: Clean Architecture (Api, Core, Infrastructure, ServiceDefaults, AppHost).
  - UI Library: TBD.

  # Environment & Build
  - DEV: Aspire orchestrates API and Frontend (Vite proxy).
  - PROD: Frontend build output to `src/Api/wwwroot`.
  - Service Communication: Aspire service discovery.

  # Standards & Workflow
  - Code: C#, TypeScript. CPM for .NET, Security Analyzers, Warnings as Errors.
  - Testing: xUnit (Backend), Vitest (Frontend). Integration tests for Api, Unit for Core.
  - Error Handling: Result pattern for domain services (no exceptions for control flow).
  - Git: Conventional Commits. Branch per task (`feature/`, `fix/`, `docs/`).
  - Git: Commit per sub-task. Final squash merge with full history in description.

# Per-artifact rules
rules:
  tasks:
    - Do NOT include separate tasks for individual commits; committing after each sub-task is an ambient rule.
    - Include one final task for the squash merge (including sub-task history in description) and branch cleanup.
    - Implementation: Always write a reproduction test before fixing a bug.
    - Implementation: "Small Batches" (testable tasks), "Self-Documenting" (XML docs for public surface), "Defensive" (boundary validation).
